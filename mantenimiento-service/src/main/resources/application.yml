server:
  port: 8090

spring:
  application:
    name: mantenimiento-service

  datasource:
    url: jdbc:h2:file:./data/mantenimientodb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true