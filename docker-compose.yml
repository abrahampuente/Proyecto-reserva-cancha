version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-reservas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reservadb
    ports:
      - "3307:3306"
    volumes:
      - mysql_reservas_data:/var/lib/mysql
    networks:
      - reserva-network

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service-app
    ports:
      - "8761:8761"
    networks:
      - reserva-network
    depends_on:
      - mysql

  user-service:
    build: ./user-service
    container_name: user-service-app
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservas:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service-app:8761/eureka/
    networks:
      - reserva-network
    depends_on:
      - mysql
      - discovery-service

  cancha-service:
    build: ./cancha-service
    container_name: cancha-service-app
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservas:3306/canchadb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service-app:8761/eureka/
    networks:
      - reserva-network
    depends_on:
      - mysql
      - discovery-service

  horario-service:
    build: ./horario-service
    container_name: horario-service-app
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservas:3306/horariodb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service-app:8761/eureka/
    networks:
      - reserva-network
    depends_on:
      - mysql
      - discovery-service
pago-service:
    build: ./pago-service
    container_name: pago-service-app
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservas:3306/pagodb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service-app:8761/eureka/
    networks:
      - reserva-network
    depends_on:
      - mysql
      - discovery-service
      - reserva-service
 

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway-app
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service-app:8761/eureka/
    networks:
      - reserva-network
      depends_on:
      - discovery-service
      - user-service
      - cancha-service
      - horario-service
      - reserva-service
      - pago-service
 

volumes:
  mysql_reservas_data:

networks:
  reserva-network:
    driver: bridge
