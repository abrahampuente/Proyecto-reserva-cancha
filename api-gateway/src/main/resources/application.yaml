server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://user-service-app:8081
              predicates:
                - Path=/api/users/**

            - id: cancha-service
              uri: http://cancha-service-app:8083
              predicates:
                - Path=/api/canchas/**

            - id: horario-service
              uri: http://horario-service-app:8084
              predicates:
                - Path=/api/horarios/**

            - id: reserva-service
              uri: http://reserva-service-app:8085
              predicates:
                - Path=/api/reservas/**

management:
  endpoints:
    web:
      exposure:
        include: health,info