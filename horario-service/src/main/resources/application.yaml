server:
  port: 8084

spring:
  application:
    name: horario-service

  datasource:
    url: jdbc:h2:mem:horariosdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

  flyway:
    enabled: true