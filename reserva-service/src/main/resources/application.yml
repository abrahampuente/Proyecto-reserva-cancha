server:
  port: 8085

spring:
  application:
    name: reserva-service

  datasource:
    url: jdbc:mysql://localhost:3307/reservadb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

services:
  user-service:
    url: http://localhost:8081
  cancha-service:
    url: http://localhost:8083
  horario-service:
    url: http://localhost:8084

logging:
  level:
    root: INFO
    cl.duoc.reservaservice: DEBUG
    org.springframework: WARN
    org.hibernate: WARN

  pattern:
    console: "%d{HH:mm:ss.SSS} [%-5level] %logger{36} - %msg%n"

  file:
    name: logs/reserva-service.log